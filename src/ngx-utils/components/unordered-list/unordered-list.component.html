<ng-template let-keyPrefix="keyPrefix" let-key="item.key" #defaultKeyTemplate>
    <label>{{ (keyPrefix ? keyPrefix + key : key) | translate }}:</label>
</ng-template>
<ng-template let-keyPrefix="keyPrefix" let-listStyle="listStyle" let-key="key" let-item="item" let-path="path"
             let-templates="templates" let-type="valueType" let-level="level" #defaultValueTemplate>
    @if (type === 'enum') {
        @let enumKey = key || item.key;
        <span [ngClass]="`list-enum enum-${enumKey} enum-value-${item.value}`">
            <span>{{ `${enumKey}.${item.value}` | translate }}</span>
        </span>
    }
    @else if (type === 'object' || type === 'array') {
        <unordered-list [data]="item.value"
                        [keyPrefix]="keyPrefix"
                        [key]="item.key"
                        [listStyle]="listStyle"
                        [path]="path"
                        [level]="level + 1"
                        [templates]="templates"></unordered-list>
    } @else {
        <span [innerHTML]="item.value"></span>
    }
</ng-template>
<ng-template let-item="item" let-data="data" let-keyPrefix="keyPrefix" let-listStyle="listStyle" let-path="path" let-level="level" let-templates="templates" #defaultItemTemplate>
    <ng-template #itemKey>
        <ng-container type="key"
                      [unorderedListItem]="item"
                      [data]="data"
                      [keyPrefix]="keyPrefix"
                      [key]="key"
                      [listStyle]="listStyle"
                      [path]="path"
                      [level]="level"
                      [templates]="templates"
                      [defaultTemplates]="defaultTemplates"></ng-container>
    </ng-template>
    <ng-template #itemValue>
        <ng-container type="value"
                      [unorderedListItem]="item"
                      [data]="data"
                      [keyPrefix]="keyPrefix"
                      [key]="key"
                      [listStyle]="listStyle"
                      [path]="path"
                      [level]="level"
                      [templates]="templates"
                      [defaultTemplates]="defaultTemplates"></ng-container>
    </ng-template>
    <ng-container *ngIf="!isArray">
        <th *ngIf="listStyle == 'table'; else itemKey">
            <ng-container [ngTemplateOutlet]="itemKey"></ng-container>
        </th>
    </ng-container>
    <td *ngIf="listStyle == 'table'; else itemValue">
        <ng-container [ngTemplateOutlet]="itemValue"></ng-container>
    </td>
</ng-template>
<ng-template #value>
    <span [innerHTML]="data"></span>
</ng-template>
<ng-container *ngIf="(isObject || isArray); else value" [ngSwitch]="listStyle">
    <ul [ngClass]="[level === 0 ? 'unordered-list' : '', 'level-' + level]" *ngSwitchCase="'list'">
        <li *ngFor="let item of data | entries" [ngClass]="item.classList">
            <ng-container type="item"
                          [unorderedListItem]="item"
                          [data]="data"
                          [keyPrefix]="keyPrefix"
                          [listStyle]="listStyle"
                          [path]="path ? path + '.' + item.key : item.key"
                          [level]="level"
                          [templates]="templates"
                          [defaultTemplates]="defaultTemplates"></ng-container>
        </li>
    </ul>
    <table [ngClass]="[level === 0 ? 'unordered-list' : '', 'level-' + level]" *ngSwitchDefault>
        <tr *ngFor="let item of data | entries" [ngClass]="item.classList">
            <ng-container type="item"
                          [unorderedListItem]="item"
                          [data]="data"
                          [keyPrefix]="keyPrefix"
                          [listStyle]="listStyle"
                          [path]="path ? path + '.' + item.key : item.key"
                          [level]="level"
                          [templates]="templates"
                          [defaultTemplates]="defaultTemplates"></ng-container>
        </tr>
    </table>
</ng-container>
