<ng-template #fallback let-value="value">
    {{ value ?? '-' }}
</ng-template>
<ng-template #defaultTemplate let-context let-column="column" let-id="id" let-value="value">
    @switch (column.filterType) {
        @case ('checkbox') {
            <div class="table-checkbox">
                <icon [name]="value ? 'check' : 'xmark'"></icon>
            </div>
        }
        @case ('enum') {
            @let optionPrefix = column.enumPrefix || id;
            <div [ngClass]="`table-enum enum-${optionPrefix} enum-value-${value}`">
                <span>{{ `${optionPrefix}.${value}` | translate }}</span>
            </div>
        }
        @default {
            <ng-container [ngxTemplateOutlet]="fallbackTemplate() || fallback"
                          [context]="context"></ng-container>
        }
    }
</ng-template>
<ng-container [ngxTemplateOutlet]="template() || defaultTemplate"
              [context]="context()"
              [additionalContext]="{defaultTemplate}"></ng-container>
